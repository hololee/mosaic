<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mosaic</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar-group toolbar-file">
        <button class="tool-button primary" id="openButton" type="button" title="Open image or project (Cmd/Ctrl+O)" aria-label="Open image or project">Open</button>
      </div>
      <div class="toolbar-group toolbar-tools">
        <button class="tool-button" data-tool="move" type="button" title="Move masks (V)" aria-label="Move masks">Move</button>
        <button class="tool-button" data-tool="pan" type="button" title="Pan canvas (H)" aria-label="Pan canvas">Hand</button>
        <button class="tool-button" data-tool="rectangle" type="button" title="Rectangle mask (R)" aria-label="Rectangle mask">Rect</button>
        <button class="tool-button" data-tool="ellipse" type="button" title="Ellipse mask (O)" aria-label="Ellipse mask">Oval</button>
        <button class="tool-button" data-tool="lasso" type="button" title="Lasso mask (L)" aria-label="Lasso mask">Lasso</button>
        <button class="tool-button" data-tool="brush" type="button" title="Brush mask (B)" aria-label="Brush mask">Brush</button>
        <button class="tool-button" data-tool="eraser" type="button" title="Erase masks (E)" aria-label="Erase masks">Erase</button>
      </div>
      <div class="toolbar-group toolbar-history">
        <button class="icon-button" id="undoButton" type="button" title="Undo (Cmd/Ctrl+Z)" aria-label="Undo">Undo</button>
        <button class="icon-button" id="redoButton" type="button" title="Redo (Cmd/Ctrl+Shift+Z)" aria-label="Redo">Redo</button>
      </div>
      <div class="toolbar-group toolbar-mosaic">
        <label class="slider-label">
          Block
          <input id="blockSize" type="range" min="4" max="72" step="1" value="24" />
          <output id="blockSizeValue">24</output>
        </label>
      </div>
      <div class="toolbar-group toolbar-view">
        <button class="tool-button" id="fitButton" type="button" title="Fit image to window (Cmd/Ctrl+0)" aria-label="Fit image to window">Fit</button>
        <button class="tool-button" id="actualButton" type="button" title="Actual size (Cmd/Ctrl+1)" aria-label="Actual size">100%</button>
      </div>
      <div class="toolbar-group toolbar-output">
        <button class="tool-button" id="saveButton" type="button" title="Save project (Cmd/Ctrl+S)" aria-label="Save project">Save</button>
        <button class="tool-button" id="exportButton" type="button" title="Export PNG or JPG (Cmd/Ctrl+Shift+E)" aria-label="Export PNG or JPG">Export</button>
        <button class="tool-button" id="clipboardButton" type="button" title="Export image to clipboard (Cmd/Ctrl+Alt+C)" aria-label="Export image to clipboard">Clipboard</button>
      </div>
    </header>

    <main class="workspace">
      <canvas id="canvas"></canvas>
      <button id="emptyOpenButton" class="empty-open" type="button" title="Open an image or project" aria-label="Open an image or project">
        <strong>Open Image</strong>
        <span>Drop an image, paste from clipboard, or use the File menu.</span>
      </button>
    </main>

    <footer class="statusbar">
      <span id="statusText">Ready</span>
      <span id="documentText">No document</span>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
