<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1776 899" role="img" aria-labelledby="title desc">
  <title id="title">Mosaic</title>
  <desc id="desc">Editable mosaic redaction.</desc>
  <defs>
    <radialGradient id="blueGlow" cx="18%" cy="36%" r="43%">
      <stop offset="0%" stop-color="#154dff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#0fa6d9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#020815" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="34%" cy="48%" r="32%">
      <stop offset="0%" stop-color="#7bcf32" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#020815" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="magentaGlow" cx="9%" cy="69%" r="37%">
      <stop offset="0%" stop-color="#d414a8" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#020815" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeGlow" cx="25%" cy="88%" r="34%">
      <stop offset="0%" stop-color="#f26a2e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#020815" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020817"/>
      <stop offset="58%" stop-color="#061022"/>
      <stop offset="100%" stop-color="#020711"/>
    </linearGradient>
    <linearGradient id="appFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162b4f"/>
      <stop offset="100%" stop-color="#051427"/>
    </linearGradient>
    <linearGradient id="tagline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#32d6ff"/>
      <stop offset="36%" stop-color="#8b5cff"/>
      <stop offset="70%" stop-color="#ff5b9a"/>
      <stop offset="100%" stop-color="#ffd34c"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="textShadow" x="-10%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#000000" flood-opacity="0.72"/>
    </filter>
    <style>
      .title {
        font: 900 172px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .tagline {
        font: 400 54px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .copy {
        font: 400 37px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .code {
        font: 700 31px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </defs>

  <rect width="1776" height="899" fill="url(#bg)"/>
  <rect width="1776" height="899" fill="url(#blueGlow)"/>
  <rect width="1776" height="899" fill="url(#greenGlow)"/>
  <rect width="1776" height="899" fill="url(#magentaGlow)"/>
  <rect width="1776" height="899" fill="url(#orangeGlow)"/>

  <g filter="url(#softShadow)">
    <rect x="144" y="201" width="463" height="463" rx="92" fill="url(#appFace)" stroke="#355888" stroke-width="4"/>
    <rect x="147" y="204" width="457" height="457" rx="89" fill="none" stroke="#6e9ed3" stroke-opacity="0.24" stroke-width="4"/>
    <rect x="214" y="271" width="78" height="78" fill="#ff2d1d"/>
    <rect x="297" y="271" width="78" height="78" fill="#ff9b08"/>
    <rect x="380" y="271" width="78" height="78" fill="#ffe315"/>
    <rect x="463" y="271" width="78" height="78" fill="#28cdea"/>
    <rect x="214" y="354" width="78" height="78" fill="#4cd017"/>
    <rect x="297" y="354" width="78" height="78" fill="#35d5e8"/>
    <rect x="380" y="354" width="78" height="78" fill="#0879de"/>
    <rect x="463" y="354" width="78" height="78" fill="#8b23c8"/>
    <rect x="214" y="437" width="78" height="78" fill="#46c918"/>
    <rect x="297" y="437" width="78" height="78" fill="#ffd70a"/>
    <rect x="380" y="437" width="78" height="78" fill="#ff730d"/>
    <rect x="463" y="437" width="78" height="78" fill="#f71b78"/>
    <rect x="214" y="520" width="78" height="78" fill="#24c9e7"/>
    <rect x="297" y="520" width="78" height="78" fill="#0575d9"/>
    <rect x="380" y="520" width="78" height="78" fill="#751fc8"/>
    <rect x="463" y="520" width="78" height="78" fill="#f51a78"/>
    <g fill="none" stroke="#08101d" stroke-width="5" opacity="0.74">
      <path d="M214 271h327v327H214z"/>
      <path d="M296 271v327M379 271v327M462 271v327M214 353h327M214 436h327M214 519h327"/>
    </g>
    <g fill="#ffffff" opacity="0.18">
      <rect x="222" y="280" width="64" height="5"/>
      <rect x="305" y="280" width="64" height="5"/>
      <rect x="388" y="280" width="64" height="5"/>
      <rect x="471" y="280" width="64" height="5"/>
    </g>
  </g>

  <g filter="url(#textShadow)">
    <text class="title" x="714" y="414" fill="#f7f7f8">Mosaic</text>
    <text class="tagline" x="717" y="502" fill="url(#tagline)">Editable mosaic redaction.</text>
    <text class="copy" x="717" y="581" fill="#d8dbe4">Open an image, mark sensitive regions with shape tools,</text>
    <text class="copy" x="717" y="630" fill="#d8dbe4">save an editable</text>
    <rect x="981" y="597" width="90" height="50" rx="10" fill="#22314a" opacity="0.86"/>
    <text class="code" x="999" y="631" fill="#ffffff">.msc</text>
    <text class="copy" x="1084" y="630" fill="#d8dbe4">project, or export a flattened PNG/JPG.</text>
  </g>
</svg>
